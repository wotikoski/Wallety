<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo box -->
  <rect x="520" y="80" width="160" height="160" rx="32" fill="white"/>
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="110" font-weight="900" fill="#3730a3">W</text>

  <!-- App name -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="white">Wallety</text>

  <!-- Headline -->
  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="rgba(255,255,255,0.9)">Controle suas finanças com facilidade</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">Receitas, despesas e grupos — tudo em um só lugar.</text>

  <!-- CTA button -->
  <rect x="450" y="475" width="300" height="54" rx="12" fill="white"/>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3730a3">Acesse gratuitamente →</text>
</svg>
